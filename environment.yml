# Full Plaque Toolkit app environment (GUI + validated engine + turbidity).
# Cross-platform: Windows, macOS (incl. Apple Silicon) and Linux.
#
#   conda env create -f environment.yml          # or:  mamba env create -f environment.yml
#   conda run -n plaque python plaque_app.py      # launch the app
#
# numpy MUST stay < 2 (the upstream tool used np.warnings, removed in numpy 2.0).
name: plaque
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pip
  - pip:
      - numpy<2
      - opencv-python>=4.6,<5
      - imutils>=0.5.4
      - pandas>=1.3,<3
      - Pillow>=9
      - matplotlib>=3.5
      - pillow-heif>=0.13
      - PySide6>=6.4,<6.8       # Qt GUI (the app)
