name: Build macOS app

# Build the macOS "Plaque Toolkit.app" (+ .dmg) on a real Apple-Silicon runner, since PyInstaller
# cannot cross-compile from Windows. Apple Silicon only — it covers every Mac since late 2020, and
# GitHub's free Intel (macos-13) runners are being deprecated and queue for hours, so Intel is not
# built here (see the matrix note below to re-add it). Runs on demand (Actions tab -> "Run
# workflow") or on a version tag like v1.0.0. Download the .dmg from the run's Artifacts section.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon only. To also build Intel later, uncomment the macos-13 entry
          # (note: GitHub's free Intel runners queue unreliably and are being retired):
          #   - runner: macos-13   # Intel x86_64
          #     arch: x86_64
          - runner: macos-14   # Apple Silicon (M-series)
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # The app's runtime + build stack (mirrors the Windows 'plaqueapp' env).
          pip install pyinstaller PySide6 opencv-python pillow pillow-heif \
                      pandas imutils matplotlib scikit-image scipy \
                      torch torchvision ultralytics
          # Pin numpy<2 LAST — the validated engine needs numpy 1.x and the --smoke gate
          # asserts it (matches how the Windows env was built).
          pip install "numpy<2"

      - name: Build .app + .dmg (bundles the Precise engine)
        run: |
          chmod +x build_macos.sh
          PLAQUE_PY="$(command -v python)" ./build_macos.sh

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: PlaqueToolkit-macos-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.app
